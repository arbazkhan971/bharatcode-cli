version: 2
updates:
  # pnpm project for the Cloudflare OIDC proxy.
  - package-ecosystem: "npm"
    directory: "/oidc-proxy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      ui-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Cargo workspace at the repo root.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
