name: Canary

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: canary-release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-cli:
    uses: ./.github/workflows/build-cli.yml
    secrets: inherit

  install-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: installers
          path: |
            download_cli.sh
            download_cli.ps1

  publish:
    needs: [build-cli, install-scripts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true

      - name: Stage compatibility aliases and checksums
        shell: bash
        run: |
          set -euo pipefail
          cp bharatcode-aarch64-apple-darwin.tar.gz bharatcode_Darwin_arm64.tar.gz
          cp bharatcode-x86_64-apple-darwin.tar.gz bharatcode_Darwin_x86_64.tar.gz
          cp bharatcode-aarch64-unknown-linux-gnu.tar.gz bharatcode_Linux_arm64.tar.gz
          cp bharatcode-x86_64-unknown-linux-gnu.tar.gz bharatcode_Linux_x86_64.tar.gz
          shopt -s nullglob
          assets=(
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
          )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No canary assets found" >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
            checksums.txt

      - name: Publish canary release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          tag: canary
          name: Canary
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          omitBody: true
          artifacts: |
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
            checksums.txt
