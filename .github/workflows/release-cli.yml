# Release workflow: builds the `bharatcode` CLI for the four distributed
# targets and publishes them as a GitHub Release.
#
# Trigger: push of a tag matching `v*` (e.g. v0.6.0). The asset names produced
# here MUST match the npm shim and the Homebrew formula EXACTLY:
#
#   bharatcode_Darwin_arm64.tar.gz   (aarch64-apple-darwin)
#   bharatcode_Darwin_x86_64.tar.gz  (x86_64-apple-darwin)
#   bharatcode_Linux_arm64.tar.gz    (aarch64-unknown-linux-gnu)
#   bharatcode_Linux_x86_64.tar.gz   (x86_64-unknown-linux-gnu)
#
# Each tarball contains the bare `bharatcode` binary at its root, so the shim
# can `tar -xzf <asset> -C <bin-dir>` and find `<bin-dir>/bharatcode`.
#
# The distributed binary is built CLI-only with:
#   cargo build --release --target <TARGET> -p bharatcode-cli --bin bharatcode \
#     --no-default-features --features rustls-tls
# The optional local-inference (llama) feature is intentionally skipped.
#
# Linux builds run inside manylinux_2_28 containers (glibc 2.28+ compat);
# macOS builds run on native macOS runners. No desktop bundles, no provenance.

name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "12.0"

jobs:
  build:
    name: Build ${{ matrix.os-name }} ${{ matrix.arch-token }}
    runs-on: ${{ matrix.build-on }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 -> bharatcode_Linux_x86_64.tar.gz
          - target: x86_64-unknown-linux-gnu
            os-name: Linux
            arch-token: x86_64
            build-on: ubuntu-22.04
            # Pinned by digest for reproducible builds; bump explicitly when newer manylinux_2_28 images ship.
            container: quay.io/pypa/manylinux_2_28_x86_64@sha256:441c35fdc6ee809ff9260894f8468ab4fea8c15dc880f8700a3f81b7922c1cda
          # Linux aarch64 -> bharatcode_Linux_arm64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os-name: Linux
            arch-token: arm64
            build-on: ubuntu-22.04-arm
            # Pinned by digest for reproducible builds; bump explicitly when newer manylinux_2_28 images ship.
            container: quay.io/pypa/manylinux_2_28_aarch64@sha256:8b5f2b4e8c072ae5aefeb659f22c03e1ff46e6a82f154b6c904b106c87e65ff7
          # macOS x86_64 -> bharatcode_Darwin_x86_64.tar.gz
          - target: x86_64-apple-darwin
            os-name: Darwin
            arch-token: x86_64
            build-on: macos-15-intel
            container: ""
          # macOS aarch64 -> bharatcode_Darwin_arm64.tar.gz
          - target: aarch64-apple-darwin
            os-name: Darwin
            arch-token: arm64
            build-on: macos-latest
            container: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Linux build dependencies (manylinux container)
        if: matrix.container != ''
        run: |
          # perl-core provides FindBin, File::Compare, etc. that openssl-sys's
          # vendored openssl build needs; in AlmaLinux 8 these aren't standalone packages.
          # clang provides libclang.so for bindgen. git/tar keep actions/checkout
          # from falling back to a tarball download if the base image changes.
          dnf install -y --setopt=install_weak_deps=False \
            openssl-devel \
            dbus-devel \
            libxcb-devel \
            cmake \
            perl-core \
            clang \
            git \
            tar

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: release-cli-${{ matrix.target }}-${{ matrix.build-on }}-${{ matrix.container || 'native' }}

      - name: Build CLI (macOS host runner)
        if: matrix.container == ''
        env:
          RUST_BACKTRACE: 1
        run: |
          source ./bin/activate-hermit
          rustup target add "${{ matrix.target }}"
          rustup show
          cargo build --release --target "${{ matrix.target }}" \
            -p bharatcode-cli --bin bharatcode \
            --no-default-features --features rustls-tls

      - name: Build CLI (manylinux container)
        if: matrix.container != ''
        env:
          RUST_BACKTRACE: 1
        run: |
          # Hermit's tool cache is host-runner-scoped; inside the container we
          # bootstrap rustup directly and let rust-toolchain.toml pin the channel.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          RUST_CHANNEL=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)
          if [ -z "$RUST_CHANNEL" ]; then
            echo "Could not parse channel from rust-toolchain.toml" >&2
            exit 1
          fi
          rustup toolchain install "$RUST_CHANNEL" --profile minimal \
            --component rustc,cargo --target "${{ matrix.target }}"
          rustup show
          cargo build --release --target "${{ matrix.target }}" \
            -p bharatcode-cli --bin bharatcode \
            --no-default-features --features rustls-tls

      - name: Package CLI
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          ASSET="bharatcode_${{ matrix.os-name }}_${{ matrix.arch-token }}.tar.gz"

          BIN="target/${TARGET}/release/bharatcode"
          if [ ! -f "${BIN}" ]; then
            echo "Built binary not found at ${BIN}" >&2
            ls -la "target/${TARGET}/release/" || true
            exit 1
          fi

          # Stage the bare binary at the root of the tarball so the npm shim's
          # `tar -xzf <asset> -C <bin-dir>` lands `<bin-dir>/bharatcode`.
          STAGE="$(mktemp -d)"
          cp "${BIN}" "${STAGE}/bharatcode"
          chmod +x "${STAGE}/bharatcode"
          tar -czf "${ASSET}" -C "${STAGE}" bharatcode

          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          ls -la
          sha256sum bharatcode_*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8  # v2.3.2
        with:
          files: |
            dist/bharatcode_Darwin_arm64.tar.gz
            dist/bharatcode_Darwin_x86_64.tar.gz
            dist/bharatcode_Linux_arm64.tar.gz
            dist/bharatcode_Linux_x86_64.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true
