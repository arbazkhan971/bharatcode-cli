# This workflow is main release, needs to be manually tagged & pushed.
#
# This is the sole publisher for version tags. release-cli.yml is manual-only so
# the two never create/update the same release concurrently.
#
# Artifact contract (consumed by download_cli.sh, download_cli.ps1 and `bharatcode update`):
#
#   bharatcode-<target>[-variant].tar.bz2   installers + updater (Linux/macOS)
#   bharatcode-<target>[-variant].tar.gz    generic
#   bharatcode-<target>[-variant].zip       installers + updater (Windows)
#   bharatcode_<Os>_<Arch>.tar.gz           Homebrew/npm shim aliases (see "Stage shim aliases")
#   checksums.txt                           sha256 manifest covering *every* asset above
#
# checksums.txt is published to both the versioned tag and `stable`. Installers and the
# updater refuse to extract an archive that is missing from it, so any asset added to a
# release here must also be added to the checksum globs below or it becomes uninstallable.
on:
  push:
    tags:
      - "v*"

name: Release

permissions:
  id-token: write   # Required for Sigstore OIDC signing and AWS OIDC (Windows signing)
  contents: write   # Required for creating releases and by actions/checkout
  actions: read     # May be needed for some workflows
  pull-requests: write  # Required for npm publish workflow
  attestations: write  # Required for SLSA build provenance attestations

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  release-metadata:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
      stable: ${{ steps.tag.outputs.stable }}
    steps:
      - name: Validate semantic version
        id: tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH with an optional SemVer prerelease suffix." >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi

  # ------------------------------------
  # 1) Build CLI for multiple OS/Arch
  # ------------------------------------
  build-cli:
    needs: release-metadata
    uses: ./.github/workflows/build-cli.yml
    with:
      version: ${{ needs.release-metadata.outputs.version }}

  # ------------------------------------
  # 2) Upload Install CLI Script
  # ------------------------------------
  install-script:
    name: Upload Install Script
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: installers
          path: |
            download_cli.sh
            download_cli.ps1

  # ------------------------------------
  # 7) Create/Update GitHub Release
  # ------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [release-metadata, build-cli, install-script]
    permissions:
      contents: write
      id-token: write      # Required for Sigstore OIDC signing
      attestations: write  # Required for SLSA build provenance attestations
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true

      # The Homebrew/npm shims fetch `bharatcode_<Os>_<Arch>.tar.gz`. These are copies of the
      # standard `.tar.gz` that build-cli already produces (bare `bharatcode` at the tar root,
      # so `tar -xzf <asset> -C <bin-dir>` still lands `<bin-dir>/bharatcode`). Copying rather
      # than running a second build means one binary per platform per release instead of two
      # independently built ones, and the alias shares its digest with the asset it copies.
      - name: Stage shim aliases
        shell: bash
        run: |
          set -euo pipefail
          stage_alias() {
            if [ ! -f "$1" ]; then
              echo "Expected CLI artifact missing: $1" >&2
              exit 1
            fi
            cp "$1" "$2"
            echo "  $2 <- $1"
          }
          stage_alias bharatcode-aarch64-apple-darwin.tar.gz      bharatcode_Darwin_arm64.tar.gz
          stage_alias bharatcode-x86_64-apple-darwin.tar.gz       bharatcode_Darwin_x86_64.tar.gz
          stage_alias bharatcode-aarch64-unknown-linux-gnu.tar.gz bharatcode_Linux_arm64.tar.gz
          stage_alias bharatcode-x86_64-unknown-linux-gnu.tar.gz  bharatcode_Linux_x86_64.tar.gz

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          rm -f checksums.txt
          assets=(
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
          )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found to checksum" >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > checksums.txt
          cat checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
            checksums.txt

      # Create/update the versioned release
      - name: Release versioned
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
            checksums.txt
          allowUpdates: true
          omitBody: true
          prerelease: ${{ needs.release-metadata.outputs.prerelease }}

      # Create/update the stable release. download_cli.sh and checksums.txt are uploaded
      # together here, so the script a user curls from `stable` always lands in a release
      # that carries the manifest that script requires.
      - name: Release stable
        if: needs.release-metadata.outputs.stable == 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          tag: stable
          name: Stable
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            bharatcode-*.tar.bz2
            bharatcode-*.tar.gz
            bharatcode-*.zip
            bharatcode_*.tar.gz
            download_cli.sh
            download_cli.ps1
            checksums.txt
          allowUpdates: true
          removeArtifacts: true
          omitBody: true
          omitPrereleaseDuringUpdate: true
