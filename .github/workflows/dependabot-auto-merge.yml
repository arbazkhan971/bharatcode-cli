name: Dependabot Review

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.repository.fork == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve patch and minor PRs
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor PRs
        if: |
          vars.DEPENDABOT_AUTO_MERGE == 'true' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          required_checks=$(gh api \
            "repos/${{ github.repository }}/branches/$BASE_BRANCH/protection" \
            --jq '((.required_status_checks.contexts // []) + ((.required_status_checks.checks // []) | map(.context))) | unique | length')
          if [ "$required_checks" -eq 0 ]; then
            echo "Dependabot auto-merge requires branch protection with required checks." >&2
            exit 1
          fi
          gh pr merge --auto --merge "$PR_URL"
